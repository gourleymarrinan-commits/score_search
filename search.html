#result{

.infoTable{

#printBtn{

};function showError(message){

function hideError(){

    document.getElementById("error").style.display="none";

}

function searchScore(){

    hideError();

    let name=document.getElementById("stuName").value.trim();

    let id=document.getElementById("stuId").value.trim().toUpperCase();

    if(name===""){

        showError("请输入学生姓名！");

        return;

    }

    if(id===""){

        showError("请输入身份证号码！");

        return;

    }

    let stu=null;

    for(let i=0;i<scoreData.length;i++){

        if(scoreData[i].name===name){

            stu=scoreData[i];

            break;

        }

    }

    if(stu==null){

        showError("未找到该学生，请检查姓名是否正确！");

        return;

    }

    if(idData[name]!==id){

        showError("身份证号码错误，请重新输入！");

        return;

    }

    document.getElementById("result").style.display="block";

    document.getElementById("rName").innerHTML=name;

    document.getElementById("rId").innerHTML=idData[name];

    document.getElementById("rTotal").innerHTML=stu.total;

    document.getElementById("rRank").innerHTML=stu.rank;

    document.getElementById("yw").innerHTML=stu.yw;

    document.getElementById("sx").innerHTML=stu.sx;

    document.getElementById("yy").innerHTML=stu.yy;

    document.getElementById("szyy").innerHTML=stu.szyy;

    document.getElementById("gj").innerHTML=stu.gj;

    document.getElementById("tx").innerHTML=stu.tx;

    document.getElementById("xl").innerHTML=stu.xl;

    document.getElementById("ls").innerHTML=stu.ls;

    document.getElementById("xx").innerHTML=stu.xx;

}
